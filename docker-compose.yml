services:
  poker-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: poker-gambetta
        VITE_BETTING_APP_URL: ${VITE_BETTING_APP_URL:-}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://poker:poker@db:5432/poker
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      FACEIT_API_KEY: ${FACEIT_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  betting-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: betting-gambetta
        VITE_POKER_APP_URL: ${VITE_POKER_APP_URL:-}
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://poker:poker@db:5432/poker
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      FACEIT_API_KEY: ${FACEIT_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
